services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    environment:
      APP_ENV: '${APP_ENV:-local}'
      APP_DEBUG: '${APP_DEBUG:-true}'
      APP_URL: '${APP_URL:-http://localhost}'
      APP_KEY: '${APP_KEY:-}'
      DB_CONNECTION: '${DB_CONNECTION:-mysql}'
      DB_HOST: '${DB_HOST:-mysql}'
      DB_PORT: '${DB_PORT:-3306}'
      DB_DATABASE: '${DB_DATABASE:-pokeapi_app}'
      DB_USERNAME: '${DB_USERNAME:-pokeapi}'
      DB_PASSWORD: '${DB_PASSWORD:-secret}'
      CACHE_STORE: 'redis'
      QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
      SESSION_DRIVER: 'database'
      REDIS_CLIENT: '${REDIS_CLIENT:-phpredis}'
      REDIS_HOST: '${REDIS_HOST:-redis}'
      REDIS_PORT: '${REDIS_PORT:-6379}'
      REDIS_PASSWORD: '${REDIS_PASSWORD:-null}'
      CONTAINER_ROLE: web
    volumes:
      - '.:/var/www/html'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: '${APP_ENV:-local}'
      APP_DEBUG: '${APP_DEBUG:-true}'
      APP_URL: '${APP_URL:-http://localhost}'
      APP_KEY: '${APP_KEY:-}'
      DB_CONNECTION: '${DB_CONNECTION:-mysql}'
      DB_HOST: '${DB_HOST:-mysql}'
      DB_PORT: '${DB_PORT:-3306}'
      DB_DATABASE: '${DB_DATABASE:-pokeapi_app}'
      DB_USERNAME: '${DB_USERNAME:-pokeapi}'
      DB_PASSWORD: '${DB_PASSWORD:-secret}'
      CACHE_STORE: 'redis'
      QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
      SESSION_DRIVER: 'database'
      REDIS_CLIENT: '${REDIS_CLIENT:-phpredis}'
      REDIS_HOST: '${REDIS_HOST:-redis}'
      REDIS_PORT: '${REDIS_PORT:-6379}'
      REDIS_PASSWORD: '${REDIS_PASSWORD:-null}'
      CONTAINER_ROLE: queue
    command: ['php', 'artisan', 'queue:work', '--sleep=1', '--tries=3', '--max-time=3600']
    volumes:
      - '.:/var/www/html'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: 'mysql:8.4'
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE:-pokeapi_app}'
      MYSQL_USER: '${DB_USERNAME:-pokeapi}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - 'mysql_data:/var/lib/mysql'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-secret}']
      retries: 10
      timeout: 5s
      interval: 10s

  redis:
    image: 'redis:alpine'
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 10
      timeout: 5s
      interval: 10s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
