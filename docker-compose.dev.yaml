services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMPOSER_FLAGS: ''
    restart: unless-stopped
    ports:
      - '${APP_PORT:-80}:80'
    environment:
      CONTAINER_ROLE: web
    volumes:
      - '.:/var/www/html'
      - 'app_vendor_data:/var/www/html/vendor'
      - 'node_modules_data:/var/www/html/node_modules'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMPOSER_FLAGS: ''
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: queue
    command: ['php', 'artisan', 'queue:work', '--sleep=1', '--tries=3', '--max-time=3600']
    volumes:
      - '.:/var/www/html'
      - 'queue_vendor_data:/var/www/html/vendor'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: 'mysql:8.4'
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-3306}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: '${DB_DATABASE:-pokeapi_app}'
      MYSQL_USER: '${DB_USERNAME:-pokeapi}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - 'mysql_data:/var/lib/mysql'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-secret}']
      retries: 10
      timeout: 5s
      interval: 10s

  redis:
    image: 'redis:alpine'
    restart: unless-stopped
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - 'redis_data:/data'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 10
      timeout: 5s
      interval: 10s

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_vendor_data:
    driver: local
  queue_vendor_data:
    driver: local
  node_modules_data:
    driver: local
